<svg xmlns="http://www.w3.org/2000/svg" width="560" height="200" viewBox="0 0 560 200">
  <rect width="560" height="200" fill="#282c33" rx="8"/>

  <!-- Row 1: Surfaces -->
  <rect x="16" y="16" width="80" height="64" fill="#3b414d" rx="6"/>
  <rect x="104" y="16" width="80" height="64" fill="#2f343e" rx="6"/>
  <rect x="192" y="16" width="80" height="64" fill="#282c33" rx="6" stroke="#464b57" stroke-width="1"/>

  <!-- Row 1: Text -->
  <rect x="288" y="16" width="80" height="64" fill="#464b57" rx="6"/>
  <rect x="376" y="16" width="80" height="64" fill="#74ade8" rx="6"/>
  <rect x="464" y="16" width="80" height="64" fill="#47679e" rx="6"/>

  <!-- Labels row 1 -->
  <text x="56"  y="96" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#3b414d</text>
  <text x="144" y="96" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#2f343e</text>
  <text x="232" y="96" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#282c33</text>
  <text x="328" y="96" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#464b57</text>
  <text x="416" y="96" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#74ade8</text>
  <text x="504" y="96" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#47679e</text>

  <!-- Row 1 role labels -->
  <text x="56"  y="108" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">window</text>
  <text x="144" y="108" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">surface</text>
  <text x="232" y="108" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">base</text>
  <text x="328" y="108" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">border</text>
  <text x="416" y="108" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">accent</text>
  <text x="504" y="108" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">accent dark</text>

  <!-- Row 2: Text + Status colors -->
  <rect x="16"  y="120" width="80" height="48" fill="#dce0e5" rx="6"/>
  <rect x="104" y="120" width="80" height="48" fill="#a9afbc" rx="6"/>
  <rect x="192" y="120" width="80" height="48" fill="#878a98" rx="6"/>
  <rect x="288" y="120" width="80" height="48" fill="#a1c181" rx="6"/>
  <rect x="376" y="120" width="80" height="48" fill="#dec184" rx="6"/>
  <rect x="464" y="120" width="80" height="48" fill="#d07277" rx="6"/>

  <!-- Labels row 2 -->
  <text x="56"  y="180" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#dce0e5</text>
  <text x="144" y="180" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#a9afbc</text>
  <text x="232" y="180" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#878a98</text>
  <text x="328" y="180" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#a1c181</text>
  <text x="416" y="180" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#dec184</text>
  <text x="504" y="180" font-family="monospace" font-size="10" fill="#878a98" text-anchor="middle">#d07277</text>

  <!-- Row 2 role labels -->
  <text x="56"  y="192" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">text</text>
  <text x="144" y="192" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">muted</text>
  <text x="232" y="192" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">dim</text>
  <text x="328" y="192" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">download</text>
  <text x="416" y="192" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">warning</text>
  <text x="504" y="192" font-family="sans-serif" font-size="9" fill="#5d636f" text-anchor="middle">error</text>
</svg>
